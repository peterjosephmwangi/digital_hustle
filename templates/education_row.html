<tr data-id="{{ education.id }}">
  <td>{{ education.institution_name }}</td>
  <td>{{ education.degree }}</td>
  <td>{{ education.field_of_study }}</td>
  <td>{{ education.education_level | escape }}</td>
  <td>{{ education.start_date }}</td>
  <td>{{ education.end_date }}</td>
  <td>{{ education.grade }}</td>
  <td>{{ education.description }}</td>
  <td>
    <a
      href="#"
      class="btn btn-primary btn-sm"
      data-toggle="modal"
      data-target="#editEducationModal"
      onclick="editEducation(
          '{{ education.id }}', 
          '{{ education.institution_name | escape }}', 
          '{{ education.degree | escape }}', 
          '{{ education.field_of_study | escape }}', 
          '{{ education.education_level | escape }}', 
          '{{ education.start_date }}', 
          '{{ education.end_date }}', 
          '{{ education.grade | escape }}', 
          '{{ education.description | escape }}'
        )"
    >
      <i class="las la-edit "></i>
    </a>
    <form 
    method="POST"
     action="/candidate/delete-education/{{ education.id }}"
      style="display: inline"
      onsubmit="return confirm('Are you sure you want to delete education?');"
      >
      <button class="btn btn-danger btn-sm delete-education" type="submit"><i class="las la-trash"></i></button>
    </form>
  </td>
</tr>
