<tr data-id="{{ experience.id }}">
  <td>{{ experience.company_name }}</td>
  <td>{{ experience.job_title }}</td>
  <td>{{ experience.from_date }}</td>
  <td>{{ experience.to_date }}</td>
  <td>{{ experience.description }}</td>
  <td>
    <a
      href="#"
      class="btn btn-primary btn-sm"
      data-toggle="modal"
      data-target="#editWorkExperienceModal"
      onclick="editWorkExperience('{{ experience.id }}', '{{ experience.company_name }}', '{{ experience.job_title }}', '{{ experience.from_date }}', '{{ experience.to_date }}', '{{ experience.description }}')"
    >
      <i class="las la-edit me-2"></i>Edit
    </a>
    <form
      method="POST"
      action="/candidate/delete-work-experience/{{ experience.id }}"
      style="display: inline"
    >
      <button
        class="btn btn-danger btn-sm delete-work-experience"
        type="submit"
      >
        DELETE
      </button>
    </form>
  </td>
</tr>
